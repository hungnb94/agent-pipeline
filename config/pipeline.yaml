entry: spec

steps:
  spec:
    type: agent
    prompt: |
      Analyze the requirements from spec file: {{spec_file}}
      Extract key features, constraints, and acceptance criteria.
    next: plan

  plan:
    type: agent
    prompt: |
      Create a step-by-step implementation plan based on the spec analysis:
      {{spec_output}}
      
      Break down into:
      - Architecture decisions
      - Implementation steps
      - Test strategy
    next: build

  build:
    type: agent
    prompt: |
      Execute the implementation plan:
      {{plan_output}}
      
      Implement code following the plan.
    next: test

  test:
    type: agent
    prompt: |
      Run tests and verify the implementation:
      {{build_output}}
      
      - Execute test suite
      - Check coverage
      - Report failures
    next: review

  review:
    type: agent
    prompt: |
      Review the implementation:
      {{test_output}}
      
      - Code quality
      - Edge cases
      - Security concerns
      - Performance
    next: simplify

  simplify:
    type: agent
    prompt: |
      Simplify and refactor the code:
      {{review_output}}
      
      - Remove duplication
      - Improve readability
      - Apply best practices
    next: ship

  ship:
    type: agent
    prompt: |
      Prepare final artifact summary:
      {{simplify_output}}
      
      - Verify readiness
      - Generate summary
      - List deliverables
    next: record_demo

  record_demo:
    type: shell
    commands:
      - mkdir -p /tmp/evidence
      - echo "Recording demo videos..."
      - ls -la /tmp/evidence/ || echo "Evidence dir created"
    next: bump_version

  bump_version:
    type: shell
    commands:
      - |
        LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
        VERSION=$(echo "$LATEST_TAG" | sed 's/v//' | awk -F. '{print $1"."$2"."$3+1}')
        NEW_VERSION="v$VERSION"
        echo "NEW_VERSION=$NEW_VERSION" > /tmp/evidence/.new_version
        echo "Bumped version: $LATEST_TAG → $NEW_VERSION"
        npm version "$VERSION" --no-git-tag-version --allow-same-version || true
    next: create_release

  create_release:
    type: shell
    commands:
      - |
        source /tmp/evidence/.new_version
        gh release create "$NEW_VERSION" \
          --title "Release $NEW_VERSION - $(date +%Y-%m-%d)" \
          --notes "## Evidence for PR\n\nAutomated release from agent-pipeline" \
          --draft || echo "Release already exists or failed"
    next: create_pr

  create_pr:
    type: shell
    commands:
      - |
        source /tmp/evidence/.new_version
        git add src/ package.json tsconfig.json README.md config/ || true
        if ! git diff --cached --quiet; then
          git commit -m "chore(release): ${NEW_VERSION#v}"
        else
          echo "Nothing to commit"
        fi
        RELEASE_URL=$(gh release view "$NEW_VERSION" --json url -q .url 2>/dev/null || echo "")
        gh pr create \
          --title "Release ${NEW_VERSION#v}" \
          --body "## Automated Release\n\nRelease: $RELEASE_URL\n\nEvidence attached to release." \
          --base main || echo "PR creation failed or already exists"
