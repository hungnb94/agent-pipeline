entry: spec

steps:
  spec:
    type: agent
    prompt: |
      Analyze the requirements from spec file: {{spec_file}}
      Extract key features, constraints, and acceptance criteria.
    next: plan

  plan:
    type: agent
    prompt: |
      Create a step-by-step implementation plan based on the spec analysis:
      {{spec_output}}
      
      Break down into:
      - Architecture decisions
      - Implementation steps
      - Test strategy
    next: build

  build:
    type: agent
    prompt: |
      Execute the implementation plan:
      {{plan_output}}
      
      Implement code following the plan.
    next: test

  test:
    type: agent
    prompt: |
      Run tests and verify the implementation:
      {{build_output}}
      
      - Execute test suite
      - Check coverage
      - Report failures
    next: review

  review:
    type: agent
    prompt: |
      Review the implementation:
      {{test_output}}
      
      - Code quality
      - Edge cases
      - Security concerns
      - Performance
    next: simplify

  simplify:
    type: agent
    prompt: |
      Simplify and refactor the code:
      {{review_output}}
      
      - Remove duplication
      - Improve readability
      - Apply best practices
    next: ship

  ship:
    type: agent
    prompt: |
      Prepare final artifact summary:
      {{simplify_output}}
      
      - Verify readiness
      - Generate summary
      - List deliverables
    next: record_demo

  record_demo:
    type: shell
    commands:
      - |
        mkdir -p /tmp/evidence
        EVIDENCE_DIR="/tmp/evidence/phase2-$(date +%Y%m%d-%H%M%S)"
        mkdir -p "$EVIDENCE_DIR"
        # Stub: real asciinema/screenshots will replace this. For now,
        # write a manifest so downstream steps have a real path to reference.
        cat > "$EVIDENCE_DIR/MANIFEST.md" <<EOF
        # Phase 2 Calculator Evidence
        Run at: $(date -u +%Y-%m-%dT%H:%M:%SZ)
        Spec: {{spec_file}}
        Spec summary:
        {{spec_output}}
        EOF
        echo "Evidence captured at: $EVIDENCE_DIR"
        echo "$EVIDENCE_DIR" > /tmp/evidence/.last_evidence_dir
    next: bump_version

  bump_version:
    type: shell
    commands:
      - |
        set -e
        # Default to v0.0.0 if no tags exist yet.
        LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
        echo "Latest tag: $LATEST_TAG"
        # Bump patch: v1.2.3 -> v1.2.4. If LATEST_TAG is v0.0.0 (the default),
        # this still produces v0.0.1.
        VERSION=$(echo "$LATEST_TAG" | sed 's/^v//' | awk -F. '{print $1"."$2"."$3+1}')
        NEW_VERSION="v$VERSION"
        echo "New version: $NEW_VERSION"
        # Update package.json without creating a git tag (we tag in create_release).
        npm version "$VERSION" --no-git-tag-version --allow-same-version
        echo "NEW_VERSION=$NEW_VERSION" > /tmp/evidence/.new_version
    next: create_release

  create_release:
    type: shell
    commands:
      - |
        set -e
        # Source the new version written by bump_version.
        source /tmp/evidence/.new_version
        : "${NEW_VERSION:?NEW_VERSION not set — bump_version must run first}"
        # Build release notes from prior step outputs.
        NOTES=$(mktemp)
        {
          echo "## Phase 2 Calculator — ${NEW_VERSION}"
          echo
          echo "### Spec summary"
          echo '{{spec_output}}' | head -20
          echo
          echo "### Plan"
          echo '{{plan_output}}' | head -40
          echo
          echo "### Evidence"
          echo "Captured in: $(cat /tmp/evidence/.last_evidence_dir 2>/dev/null || echo 'n/a')"
        } > "$NOTES"
        # Idempotent: --draft --notes-file; if release exists, --prerelease false handles it.
        # gh release create fails if release exists; ignore that case.
        gh release create "$NEW_VERSION" \
          --title "Phase 2 Calculator ${NEW_VERSION}" \
          --notes-file "$NOTES" \
          --draft \
          $(ls /tmp/evidence/phase2-*/*.gif 2>/dev/null || true) || \
          gh release edit "$NEW_VERSION" \
            --title "Phase 2 Calculator ${NEW_VERSION}" \
            --notes-file "$NOTES" \
            --draft
        echo "Release URL: $(gh release view "$NEW_VERSION" --json url -q .url)"
    next: create_pr

  create_pr:
    type: shell
    commands:
      - |
        set -e
        source /tmp/evidence/.new_version
        : "${NEW_VERSION:?NEW_VERSION not set — bump_version must run first}"
        # Commit only the project files. /tmp/evidence/ is never in the repo,
        # but .gitignore already excludes it. Defensive: only stage the allowlist.
        git add src/ package.json tsconfig.json README.md config/ || true
        # Skip the commit if there's nothing to commit.
        if ! git diff --cached --quiet; then
          git commit -m "chore(release): v${NEW_VERSION#v}"
        else
          echo "Nothing to commit — package.json was the only change and was already committed in a prior step."
        fi
        # Resolve release URL.
        RELEASE_URL=$(gh release view "$NEW_VERSION" --json url -q .url 2>/dev/null || echo "")
        EVIDENCE_DIR=$(cat /tmp/evidence/.last_evidence_dir 2>/dev/null || echo "n/a")
        BODY=$(mktemp)
        {
          echo "## Phase 2 Calculator"
          echo
          echo "### What"
          echo '{{spec_output}}' | head -20
          echo
          echo "### How"
          echo '{{plan_output}}' | head -30
          echo
          echo "### Evidence"
          echo "- Release: $RELEASE_URL"
          echo "- Local evidence: \`$EVIDENCE_DIR\`"
          echo
          echo "_Note: evidence is stored outside the repo at \`$EVIDENCE_DIR\`._"
        } > "$BODY"
        # Idempotent: if a PR for the current branch already exists, update it.
        EXISTING_PR=$(gh pr list --head "$(git branch --show-current)" --json number -q '.[0].number' 2>/dev/null || echo "")
        if [ -n "$EXISTING_PR" ]; then
          echo "PR #$EXISTING_PR already exists — updating body."
          gh pr edit "$EXISTING_PR" --body-file "$BODY"
        else
          gh pr create \
            --title "Phase 2 calculator: v${NEW_VERSION#v}" \
            --body-file "$BODY" \
            --base main || echo "PR create failed (likely no push access or no diff vs main)"
        fi
    next: done
